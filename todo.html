<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <link rel="stylesheet" href="todo.css">
  <style>
body {
  font-family: Arial;
  background: #f4d35e; /* kuning soft */
  color: #333;

  display: flex;
  justify-content: center;
  align-items: flex-start; /* ini bikin ke atas */

  min-height: 100vh;
  padding-top: 60px; /* jarak dari atas */
}

/* container */
.container {
  background: #f4d35e
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

/* input */
.input-box {
  display: flex;
  margin-top: 15px;
}

.input-box input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.input-box button {
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

/* list */
ul {
  list-style: none;
  margin-top: 20px;
  padding: 0;
}

/* item */
li {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  animation: fadeIn 0.3s ease;
  transition: 0.2s;
}

/* hover */
li:hover {
  transform: scale(1.02);
}

/* selesai */
.done {
  text-decoration: line-through;
  opacity: 0.6;
}

/* tombol delete */
li button {
  background: red;
  color: white;
  border: none;
  padding: 5px 8px;
  cursor: pointer;
  border-radius: 4px;
}

/* animasi masuk */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}


  </style>
</head>
<body>

  <div class="container">
    <h1>To Do List</h1>

    <div class="input-box">
      <input type="text" id="input" placeholder="Add a task...">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script src="todo.js"></script>
</body>
</html>
